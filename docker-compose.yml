services:
  backend:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: story-chain-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - db-data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=8080
      - DB_PATH=/app/data/story_chain.db
      - JWT_SECRET=${JWT_SECRET:-story-chain-secret-key-change-in-production}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: story-chain-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  db-data:
    driver: local
